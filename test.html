<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Directory</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #333;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    .container {
      display: flex;
    }
    aside {
      width: 250px;
      background: #222;
      color: #fff;
      height: 100vh;
      padding: 1rem;
    }
    aside ul {
      list-style: none;
      padding: 0;
    }
    aside li {
      margin: 0.5rem 0;
    }
    aside a {
      color: #fff;
      text-decoration: none;
    }
    main {
      flex: 1;
      padding: 1rem;
    }
    .card {
      background: #fff;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .search {
      margin-bottom: 1rem;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<header>
  <h1>My Web Directory</h1>
</header>

<div class="container">

  <aside>
    <h3>Categories</h3>
    <ul>
      <li><a href="#">Technology</a></li>
      <li><a href="#">Business</a></li>
      <li><a href="#">Education</a></li>
      <li><a href="#">Entertainment</a></li>
    </ul>
  </aside>

  <main>
    <div class="search">
      <input type="text" placeholder="Search directory..." />
    </div>

    <div class="card">
      <h2>Example Website</h2>
      <p>Description of the website goes here.</p>
      <a href="#" target="_blank">Visit Site</a>
    </div>

    <div class="card">
      <h2>Another Site</h2>
      <p>Short description here.</p>
      <a href="#" target="_blank">Visit Site</a>
    </div>

  </main>

</div>

<script>
  // Basic search filter (client-side)
  const searchInput = document.querySelector('input[type="text"]');
  const cards = document.querySelectorAll('.card');

  searchInput.addEventListener('input', function() {
    const value = this.value.toLowerCase();

    cards.forEach(card => {
      const text = card.innerText.toLowerCase();
      card.style.display = text.includes(value) ? 'block' : 'none';
    });
  });
</script>

</body>
</html>
